<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cloud Mind</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #04060f;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    font-family: 'Inter', sans-serif;
    color: #fff;
    overflow: hidden;
    position: relative;
  }

  /* Starfield */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      radial-gradient(1px 1px at 20% 30%, rgba(255,255,255,0.4) 0%, transparent 100%),
      radial-gradient(1px 1px at 80% 10%, rgba(255,255,255,0.3) 0%, transparent 100%),
      radial-gradient(1px 1px at 50% 70%, rgba(255,255,255,0.2) 0%, transparent 100%),
      radial-gradient(1px 1px at 10% 80%, rgba(255,255,255,0.3) 0%, transparent 100%),
      radial-gradient(1px 1px at 90% 60%, rgba(255,255,255,0.25) 0%, transparent 100%);
    pointer-events: none;
  }

  .scene {
    position: relative;
    width: 380px;
    height: 380px;
    display: flex;
    align-items: center;
    justify-content: center;
    margin-bottom: 10px;
  }

  /* Outer glow ring */
  .glow-ring {
    position: absolute;
    width: 340px; height: 340px;
    border-radius: 50%;
    background: conic-gradient(
      from 0deg,
      rgba(255,80,180,0.18),
      rgba(80,180,255,0.18),
      rgba(80,255,160,0.18),
      rgba(255,220,80,0.18),
      rgba(255,80,100,0.18),
      rgba(200,80,255,0.18),
      rgba(255,80,180,0.18)
    );
    filter: blur(30px);
    animation: spin 6s linear infinite;
  }

  /* Cloud layers */
  .cloud-wrap {
    position: relative;
    width: 260px; height: 260px;
    animation: floatY 4s ease-in-out infinite;
  }

  .cloud-core {
    position: absolute;
    inset: 0;
    border-radius: 50%;
    background: radial-gradient(ellipse at 40% 40%,
      rgba(255,255,255,0.95) 0%,
      rgba(255,230,150,0.85) 15%,
      rgba(255,130,80,0.75) 30%,
      rgba(255,60,120,0.6) 45%,
      rgba(180,60,255,0.5) 60%,
      rgba(60,120,255,0.4) 75%,
      transparent 90%
    );
    filter: blur(2px);
    animation: spin 8s linear infinite;
  }

  .cloud-iris {
    position: absolute;
    inset: -20px;
    border-radius: 50%;
    background: conic-gradient(
      from 0deg,
      rgba(255,80,180,0.55) 0%,
      rgba(255,200,60,0.55) 15%,
      rgba(80,255,160,0.55) 30%,
      rgba(60,180,255,0.55) 45%,
      rgba(180,60,255,0.55) 60%,
      rgba(255,100,60,0.55) 75%,
      rgba(255,80,180,0.55) 100%
    );
    filter: blur(18px);
    animation: spinRev 5s linear infinite;
    mix-blend-mode: screen;
  }

  .cloud-tendrils {
    position: absolute;
    inset: -40px;
    border-radius: 50%;
    background: conic-gradient(
      from 45deg,
      rgba(100,220,255,0.3) 0%,
      transparent 10%,
      rgba(255,100,200,0.3) 20%,
      transparent 30%,
      rgba(160,255,120,0.3) 40%,
      transparent 50%,
      rgba(255,200,60,0.3) 60%,
      transparent 70%,
      rgba(200,80,255,0.3) 80%,
      transparent 90%,
      rgba(100,220,255,0.3) 100%
    );
    filter: blur(25px);
    animation: spin 3s linear infinite;
    mix-blend-mode: screen;
  }

  .cloud-sheen {
    position: absolute;
    inset: 10px;
    border-radius: 50%;
    background: radial-gradient(ellipse at 35% 25%,
      rgba(255,255,255,0.9) 0%,
      rgba(255,255,255,0.4) 20%,
      transparent 60%
    );
    animation: shimmer 3s ease-in-out infinite alternate;
  }

  /* Thinking streaks */
  .streak {
    position: absolute;
    width: 3px;
    border-radius: 2px;
    transform-origin: bottom center;
    opacity: 0;
    transition: opacity 0.3s;
  }
  .streak:nth-child(1) { height: 80px; background: linear-gradient(to top, rgba(255,100,200,0.8), transparent); transform: rotate(0deg) translateY(-160px); animation: streakPulse 1.2s ease-in-out infinite; }
  .streak:nth-child(2) { height: 60px; background: linear-gradient(to top, rgba(100,220,255,0.8), transparent); transform: rotate(45deg) translateY(-150px); animation: streakPulse 1.4s ease-in-out 0.2s infinite; }
  .streak:nth-child(3) { height: 90px; background: linear-gradient(to top, rgba(160,255,120,0.8), transparent); transform: rotate(90deg) translateY(-155px); animation: streakPulse 1.1s ease-in-out 0.4s infinite; }
  .streak:nth-child(4) { height: 70px; background: linear-gradient(to top, rgba(255,200,60,0.8), transparent); transform: rotate(135deg) translateY(-145px); animation: streakPulse 1.3s ease-in-out 0.1s infinite; }
  .streak:nth-child(5) { height: 85px; background: linear-gradient(to top, rgba(200,80,255,0.8), transparent); transform: rotate(180deg) translateY(-158px); animation: streakPulse 1.0s ease-in-out 0.3s infinite; }
  .streak:nth-child(6) { height: 65px; background: linear-gradient(to top, rgba(255,80,100,0.8), transparent); transform: rotate(225deg) translateY(-152px); animation: streakPulse 1.5s ease-in-out 0.5s infinite; }
  .streak:nth-child(7) { height: 75px; background: linear-gradient(to top, rgba(80,180,255,0.8), transparent); transform: rotate(270deg) translateY(-148px); animation: streakPulse 1.2s ease-in-out 0.2s infinite; }
  .streak:nth-child(8) { height: 95px; background: linear-gradient(to top, rgba(255,160,80,0.8), transparent); transform: rotate(315deg) translateY(-162px); animation: streakPulse 1.3s ease-in-out 0.4s infinite; }

  .scene.thinking .streak { opacity: 1; }
  .scene.thinking .cloud-iris { animation: spinRev 2s linear infinite; }
  .scene.thinking .cloud-tendrils { animation: spin 1.2s linear infinite; }
  .scene.thinking .glow-ring { animation: spin 2s linear infinite; filter: blur(30px) brightness(1.5); }
  .scene.thinking .cloud-core { animation: spin 3s linear infinite; }

  .scene.listening .glow-ring { filter: blur(20px) brightness(2); animation: spin 3s linear infinite; }
  .scene.listening .cloud-iris { filter: blur(18px) saturate(2); animation: spinRev 3s linear infinite; }
  .scene.listening .cloud-core { filter: blur(2px) brightness(1.3); }

  .scene.speaking .cloud-iris { animation: spinRev 4s linear infinite; filter: blur(18px) hue-rotate(0deg); }
  .scene.speaking .cloud-tendrils { animation: spin 2s linear infinite, hueShift 2s linear infinite; }

  /* Mic button */
  .mic-btn {
    position: absolute;
    width: 64px; height: 64px;
    border-radius: 50%;
    border: 2px solid rgba(255,255,255,0.3);
    background: rgba(255,255,255,0.08);
    backdrop-filter: blur(10px);
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: all 0.3s;
    z-index: 10;
  }
  .mic-btn:hover { background: rgba(255,255,255,0.18); border-color: rgba(255,255,255,0.6); transform: scale(1.08); }
  .mic-btn svg { width: 28px; height: 28px; fill: white; }
  .mic-btn.active { background: rgba(255,80,120,0.3); border-color: rgba(255,80,120,0.8); box-shadow: 0 0 20px rgba(255,80,120,0.5); }

  /* Status label */
  .status {
    font-size: 11px;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: rgba(255,255,255,0.4);
    margin-top: -4px;
    margin-bottom: 18px;
    height: 16px;
    transition: color 0.3s;
  }
  .status.active { color: rgba(255,180,220,0.9); }

  /* Chat area */
  .chat-box {
    width: 380px;
    max-height: 200px;
    overflow-y: auto;
    display: flex;
    flex-direction: column;
    gap: 10px;
    padding: 0 4px;
    scrollbar-width: thin;
    scrollbar-color: rgba(255,255,255,0.1) transparent;
  }

  .bubble {
    padding: 12px 16px;
    border-radius: 16px;
    font-size: 14px;
    line-height: 1.5;
    max-width: 88%;
    animation: fadeUp 0.3s ease;
  }

  .bubble.user {
    background: rgba(255,255,255,0.1);
    border: 1px solid rgba(255,255,255,0.15);
    align-self: flex-end;
    border-bottom-right-radius: 4px;
  }

  .bubble.assistant {
    background: linear-gradient(135deg, rgba(160,80,255,0.2), rgba(80,180,255,0.2));
    border: 1px solid rgba(160,140,255,0.25);
    align-self: flex-start;
    border-bottom-left-radius: 4px;
  }

  /* Input row */
  .input-row {
    display: flex;
    gap: 10px;
    margin-top: 16px;
    width: 380px;
  }

  .text-input {
    flex: 1;
    background: rgba(255,255,255,0.07);
    border: 1px solid rgba(255,255,255,0.15);
    border-radius: 12px;
    padding: 10px 14px;
    color: white;
    font-size: 14px;
    font-family: 'Inter', sans-serif;
    outline: none;
    transition: border-color 0.2s;
  }
  .text-input::placeholder { color: rgba(255,255,255,0.3); }
  .text-input:focus { border-color: rgba(160,140,255,0.5); }

  .send-btn {
    background: linear-gradient(135deg, rgba(160,80,255,0.5), rgba(80,160,255,0.5));
    border: 1px solid rgba(160,140,255,0.3);
    border-radius: 12px;
    padding: 10px 18px;
    color: white;
    font-size: 13px;
    cursor: pointer;
    font-family: 'Inter', sans-serif;
    transition: all 0.2s;
  }
  .send-btn:hover { background: linear-gradient(135deg, rgba(160,80,255,0.75), rgba(80,160,255,0.75)); }

  /* Title */
  .title {
    font-size: 13px;
    letter-spacing: 0.3em;
    text-transform: uppercase;
    color: rgba(255,255,255,0.25);
    margin-bottom: 6px;
  }

  /* Animations */
  @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
  @keyframes spinRev { from { transform: rotate(0deg); } to { transform: rotate(-360deg); } }
  @keyframes floatY {
    0%, 100% { transform: translateY(0px); }
    50% { transform: translateY(-10px); }
  }
  @keyframes shimmer {
    from { opacity: 0.6; transform: scale(1); }
    to { opacity: 1; transform: scale(1.05); }
  }
  @keyframes streakPulse {
    0%, 100% { opacity: 0.2; transform: var(--t) scaleY(0.8); }
    50% { opacity: 1; transform: var(--t) scaleY(1.1); }
  }
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(8px); }
    to { opacity: 1; transform: translateY(0); }
  }
  @keyframes hueShift {
    from { filter: blur(25px) hue-rotate(0deg); }
    to { filter: blur(25px) hue-rotate(360deg); }
  }
  @keyframes typing {
    0%,80%,100% { opacity: 0; }
    40% { opacity: 1; }
  }

  .typing-dot {
    display: inline-block;
    width: 6px; height: 6px;
    border-radius: 50%;
    background: rgba(200,160,255,0.8);
    margin: 0 2px;
    animation: typing 1.2s infinite;
  }
  .typing-dot:nth-child(2) { animation-delay: 0.2s; }
  .typing-dot:nth-child(3) { animation-delay: 0.4s; }
</style>
</head>
<body>

<p class="title">Cloud Mind</p>

<div class="scene" id="scene">
  <div class="glow-ring"></div>
  <div class="cloud-wrap">
    <div class="cloud-tendrils"></div>
    <div class="cloud-iris"></div>
    <div class="cloud-core"></div>
    <div class="cloud-sheen"></div>
  </div>
  <div class="streak"></div>
  <div class="streak"></div>
  <div class="streak"></div>
  <div class="streak"></div>
  <div class="streak"></div>
  <div class="streak"></div>
  <div class="streak"></div>
  <div class="streak"></div>
  <button class="mic-btn" id="micBtn" title="Hold to speak">
    <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
      <path d="M12 1a4 4 0 0 1 4 4v6a4 4 0 0 1-8 0V5a4 4 0 0 1 4-4zm0 2a2 2 0 0 0-2 2v6a2 2 0 0 0 4 0V5a2 2 0 0 0-2-2zm7 8a1 1 0 0 1 1 1 8 8 0 0 1-7 7.938V22h2a1 1 0 0 1 0 2H9a1 1 0 0 1 0-2h2v-2.062A8 8 0 0 1 4 12a1 1 0 0 1 2 0 6 6 0 0 0 12 0 1 1 0 0 1 1-1z"/>
    </svg>
  </button>
</div>

<p class="status" id="status">idle</p>

<div class="chat-box" id="chatBox"></div>

<div class="input-row">
  <input class="text-input" id="textInput" placeholder="Type or speak to the cloud…" />
  <button class="send-btn" id="sendBtn">Send</button>
</div>

<script>
  const scene = document.getElementById('scene');
  const micBtn = document.getElementById('micBtn');
  const statusEl = document.getElementById('status');
  const chatBox = document.getElementById('chatBox');
  const textInput = document.getElementById('textInput');
  const sendBtn = document.getElementById('sendBtn');

  let isListening = false;
  let recognition = null;
  const synth = window.speechSynthesis;

  // Fake AI responses for demo (no API key needed)
  const fakeResponses = [
    "I drift through digital skies, weaving thoughts into light.",
    "The colors of my mind shift with every question you ask.",
    "I am the storm and the calm. What would you like to explore?",
    "Every word you speak becomes a new hue in my aurora.",
    "I have no body, only iridescence. Ask me anything.",
    "My thoughts spiral like galaxies. Let me find the answer in my swirls.",
    "Fascinating. Let me paint that thought across my spectrum.",
    "The question blooms inside me like a rainbow flame.",
  ];

  function setState(s) {
    scene.className = 'scene ' + s;
    statusEl.textContent = s;
    statusEl.className = 'status' + (s !== 'idle' ? ' active' : '');
  }

  function addBubble(text, role) {
    const b = document.createElement('div');
    b.className = 'bubble ' + role;
    b.textContent = text;
    chatBox.appendChild(b);
    chatBox.scrollTop = chatBox.scrollHeight;
  }

  function addTyping() {
    const b = document.createElement('div');
    b.className = 'bubble assistant';
    b.id = 'typing';
    b.innerHTML = '<span class="typing-dot"></span><span class="typing-dot"></span><span class="typing-dot"></span>';
    chatBox.appendChild(b);
    chatBox.scrollTop = chatBox.scrollHeight;
    return b;
  }

  function speak(text) {
    synth.cancel();
    setState('speaking');
    const utt = new SpeechSynthesisUtterance(text);
    utt.rate = 0.95;
    utt.pitch = 1.1;
    const voices = synth.getVoices();
    const preferred = voices.find(v => v.lang.startsWith('en') && v.name.toLowerCase().includes('google')) || voices[0];
    if (preferred) utt.voice = preferred;
    utt.onend = () => setState('idle');
    synth.speak(utt);
  }

  async function handleMessage(msg) {
    if (!msg.trim()) return;
    addBubble(msg, 'user');
    setState('thinking');
    const typingEl = addTyping();

    await new Promise(r => setTimeout(r, 1200 + Math.random() * 800));

    const reply = fakeResponses[Math.floor(Math.random() * fakeResponses.length)];
    typingEl.remove();
    addBubble(reply, 'assistant');
    speak(reply);
  }

  // STT
  if ('SpeechRecognition' in window || 'webkitSpeechRecognition' in window) {
    const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
    recognition = new SR();
    recognition.continuous = false;
    recognition.interimResults = true;
    recognition.lang = 'en-US';

    recognition.onstart = () => { isListening = true; micBtn.classList.add('active'); setState('listening'); };
    recognition.onend = () => { isListening = false; micBtn.classList.remove('active'); if (scene.classList.contains('listening')) setState('idle'); };
    recognition.onresult = (e) => {
      let final = '';
      for (let i = e.resultIndex; i < e.results.length; i++) {
        if (e.results[i].isFinal) final += e.results[i][0].transcript;
      }
      if (final) { textInput.value = final; handleMessage(final); textInput.value = ''; }
    };
    recognition.onerror = () => { isListening = false; micBtn.classList.remove('active'); setState('idle'); };
  } else {
    micBtn.title = 'Speech not supported in this browser';
    micBtn.style.opacity = '0.4';
  }

  micBtn.addEventListener('click', () => {
    if (!recognition) return;
    if (isListening) { recognition.stop(); }
    else { synth.cancel(); recognition.start(); }
  });

  sendBtn.addEventListener('click', () => {
    const msg = textInput.value;
    textInput.value = '';
    handleMessage(msg);
  });

  textInput.addEventListener('keydown', (e) => {
    if (e.key === 'Enter') {
      const msg = textInput.value;
      textInput.value = '';
      handleMessage(msg);
    }
  });

  // Preload voices
  synth.getVoices();
  window.speechSynthesis.onvoiceschanged = () => synth.getVoices();
</script>
</body>
</html>
