<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Cloud Mind</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <p class="title">Cloud Mind</p>

    <div class="scene" id="scene">
      <div class="glow-ring"></div>
      <div class="cloud-wrap">
        <div class="cloud-tendrils"></div>
        <div class="cloud-iris"></div>
        <div class="cloud-core"></div>
        <div class="cloud-sheen"></div>
      </div>
      <div class="streak"></div>
      <div class="streak"></div>
      <div class="streak"></div>
      <div class="streak"></div>
      <div class="streak"></div>
      <div class="streak"></div>
      <div class="streak"></div>
      <div class="streak"></div>
      <button class="mic-btn" id="micBtn" title="Start listening">
        <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
          <path
            d="M12 1a4 4 0 0 1 4 4v6a4 4 0 0 1-8 0V5a4 4 0 0 1 4-4zm0 2a2 2 0 0 0-2 2v6a2 2 0 0 0 4 0V5a2 2 0 0 0-2-2zm7 8a1 1 0 0 1 1 1 8 8 0 0 1-7 7.938V22h2a1 1 0 0 1 0 2H9a1 1 0 0 1 0-2h2v-2.062A8 8 0 0 1 4 12a1 1 0 0 1 2 0 6 6 0 0 0 12 0 1 1 0 0 1 1-1z"
          />
        </svg>
      </button>
    </div>

    <p class="status" id="status">idle</p>
    <p class="transcript-line" id="liveTranscript">Press the mic or type a message.</p>

    <div class="chat-box" id="chatBox"></div>

    <div class="input-row">
      <input class="text-input" id="textInput" placeholder="Type or speak to the cloud..." />
      <button class="send-btn" id="sendBtn">Send</button>
      <button class="send-btn alt" id="stopAudioBtn">Stop voice</button>
    </div>

    <script type="module" src="/app.js"></script>
  </body>
</html>
